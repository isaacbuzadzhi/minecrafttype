<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#eee7dc" />
    <meta name="description" content="An interactive material playground for clay, straw, and timber." />
    <title>Living Materials</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2242%22 fill=%22%23a94f38%22/></svg>" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="experience" aria-label="Interactive natural material playground">
      <canvas id="world" aria-hidden="true"></canvas>

      <div class="paper-noise" aria-hidden="true"></div>

      <header class="topbar">
        <button
          id="materialButton"
          class="material-button"
          type="button"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-controls="materialMenu"
        >
          <span id="materialSwatch" class="material-swatch clay" aria-hidden="true"></span>
          <span id="materialName">Clay</span>
          <svg viewBox="0 0 12 8" aria-hidden="true"><path d="m1 1 5 5 5-5" /></svg>
        </button>

        <div id="materialMenu" class="material-menu" role="menu" hidden>
          <button type="button" role="menuitem" data-material="clay">
            <span class="menu-mark clay"></span>
            <span><strong>Clay</strong><small>Smooth + fluid</small></span>
          </button>
          <button type="button" role="menuitem" data-material="straw">
            <span class="menu-mark straw"></span>
            <span><strong>Straw</strong><small>Light + windblown</small></span>
          </button>
          <button type="button" role="menuitem" data-material="timber">
            <span class="menu-mark timber"></span>
            <span><strong>Timber</strong><small>Heavy + throwable</small></span>
          </button>
        </div>
      </header>

      <div class="label" aria-live="polite">
        <p id="modeTitle">Living clay</p>
        <span id="modeHint">Drag through it</span>
      </div>

      <button id="resetButton" class="reset-button" type="button" aria-label="Reset material">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 7v5h-5M4 17v-5h5M6.1 8.2a7 7 0 0 1 11.4-2.1L20 8M4 16l2.5 1.9a7 7 0 0 0 11.4-2.1" />
        </svg>
      </button>

      <div id="gestureHint" class="gesture-hint" aria-hidden="true">
        <span class="gesture-dot"></span>
        <span>Press + drag</span>
      </div>

      <noscript>This experience needs JavaScript enabled.</noscript>
    </main>
    <script src="app.js"></script>
  </body>
</html>
